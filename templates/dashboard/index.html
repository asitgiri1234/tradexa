<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradexa — Box Recommendation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { width: 6px; }
    .no-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <!-- Navbar -->
  <nav class="bg-slate-900 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-indigo-500 flex items-center justify-center font-bold text-lg">T</div>
      <div>
        <h1 class="text-xl font-bold tracking-tight">Tradexa</h1>
        <p class="text-xs text-slate-400 -mt-0.5">Warehouse box recommendation</p>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Product grid -->
    <section class="lg:col-span-2">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Products</h2>
        <span id="cart-count" class="text-sm text-slate-500">0 items in cart</span>
      </div>
      <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
        <p class="text-slate-400">Loading products…</p>
      </div>
    </section>

    <!-- Recommendation panel -->
    <aside class="lg:col-span-1">
      <div class="sticky top-6 space-y-4">
        <div class="bg-white rounded-xl shadow p-5">
          <h2 class="text-lg font-semibold mb-3">Recommendation</h2>

          <div id="rec-empty" class="text-slate-400 text-sm py-8 text-center">
            Add products to see a box recommendation.
          </div>

          <div id="rec-body" class="hidden">
            <div id="rec-box" class="rounded-lg border-2 border-indigo-200 bg-indigo-50 p-4 mb-4">
              <p class="text-xs uppercase tracking-wide text-indigo-500 font-semibold">Best box</p>
              <p id="rec-box-name" class="text-xl font-bold text-indigo-900">—</p>
              <p id="rec-box-dims" class="text-sm text-slate-600">—</p>
              <p class="mt-2 text-2xl font-bold text-indigo-700"><span id="rec-box-cost">—</span></p>
            </div>

            <div id="rec-nobox" class="hidden rounded-lg border-2 border-amber-200 bg-amber-50 p-4 mb-4">
              <p class="text-sm font-semibold text-amber-800">No suitable box</p>
            </div>

            <dl class="grid grid-cols-2 gap-2 text-sm mb-3">
              <div class="bg-slate-50 rounded p-2">
                <dt class="text-slate-500">Total volume</dt>
                <dd class="font-semibold"><span id="rec-volume">0</span> cm³</dd>
              </div>
              <div class="bg-slate-50 rounded p-2">
                <dt class="text-slate-500">Total weight</dt>
                <dd class="font-semibold"><span id="rec-weight">0</span> kg</dd>
              </div>
            </dl>

            <p id="rec-reason" class="text-sm text-slate-600 bg-slate-50 rounded p-3 mb-4"></p>

            <button id="confirm-btn"
              class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-semibold py-2.5 rounded-lg transition">
              Confirm Order
            </button>

            <div id="order-success" class="hidden mt-3 rounded-lg bg-green-50 border border-green-200 p-3 text-sm text-green-800">
              ✅ Order created: <span id="order-ref" class="font-bold"></span>
            </div>
          </div>
        </div>

        <!-- Boxes that don't fit -->
        <div id="other-boxes-wrap" class="bg-white rounded-xl shadow p-5 hidden">
          <h3 class="text-sm font-semibold text-slate-600 mb-3">All boxes</h3>
          <ul id="box-list" class="space-y-2"></ul>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const API = {
      products: "/api/products/",
      preview: "/api/recommend/preview/",
      orders: "/api/orders/",
    };

    // cart: Map<product_id, {product, quantity}>
    const cart = new Map();
    let products = [];

    const fmtNum = (n) => Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 });

    async function loadProducts() {
      const res = await fetch(API.products);
      products = await res.json();
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";
      products.forEach((p) => {
        const qty = cart.get(p.id)?.quantity || 0;
        const card = document.createElement("div");
        card.className = "bg-white rounded-xl shadow p-4 flex flex-col";
        card.innerHTML = `
          <h3 class="font-semibold leading-tight">${p.name}</h3>
          <p class="text-xs text-slate-400 mb-2">${p.sku}</p>
          <p class="text-sm text-slate-600">${p.length_cm} × ${p.width_cm} × ${p.height_cm} cm</p>
          <p class="text-sm text-slate-600 mb-3">${p.weight_kg} kg</p>
          <div class="mt-auto flex items-center justify-between">
            <span class="text-xs text-slate-400">Qty</span>
            <div class="flex items-center gap-2">
              <button data-act="dec" data-id="${p.id}"
                class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 font-bold text-lg leading-none">−</button>
              <span class="w-8 text-center font-semibold" id="qty-${p.id}">${qty}</span>
              <button data-act="inc" data-id="${p.id}"
                class="w-8 h-8 rounded-lg bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold text-lg leading-none">+</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    document.getElementById("product-grid").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const id = Number(btn.dataset.id);
      const product = products.find((p) => p.id === id);
      const current = cart.get(id)?.quantity || 0;
      const next = btn.dataset.act === "inc" ? current + 1 : current - 1;
      if (next <= 0) {
        cart.delete(id);
      } else {
        cart.set(id, { product, quantity: next });
      }
      document.getElementById(`qty-${id}`).textContent = Math.max(next, 0);
      updateCartCount();
      hideSuccess();
      debouncedPreview();
    });

    function updateCartCount() {
      let count = 0;
      cart.forEach((v) => (count += v.quantity));
      document.getElementById("cart-count").textContent =
        `${count} item${count === 1 ? "" : "s"} in cart`;
    }

    function cartItemsPayload() {
      return Array.from(cart.values()).map((v) => ({
        product_id: v.product.id,
        quantity: v.quantity,
      }));
    }

    let debounceTimer = null;
    function debouncedPreview() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runPreview, 300);
    }

    async function runPreview() {
      const items = cartItemsPayload();
      if (items.length === 0) {
        document.getElementById("rec-empty").classList.remove("hidden");
        document.getElementById("rec-body").classList.add("hidden");
        document.getElementById("other-boxes-wrap").classList.add("hidden");
        return;
      }
      const res = await fetch(API.preview, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items }),
      });
      const data = await res.json();
      renderRecommendation(data);
    }

    function renderRecommendation(data) {
      document.getElementById("rec-empty").classList.add("hidden");
      document.getElementById("rec-body").classList.remove("hidden");

      const hasBox = !!data.recommended_box;
      document.getElementById("rec-box").classList.toggle("hidden", !hasBox);
      document.getElementById("rec-nobox").classList.toggle("hidden", hasBox);
      document.getElementById("confirm-btn").disabled = false;

      if (hasBox) {
        const b = data.recommended_box;
        document.getElementById("rec-box-name").textContent = b.name;
        document.getElementById("rec-box-dims").textContent =
          `${b.length_cm} × ${b.width_cm} × ${b.height_cm} cm · max ${b.max_weight_kg} kg`;
        document.getElementById("rec-box-cost").textContent = `$${b.cost}`;
      }

      document.getElementById("rec-volume").textContent = fmtNum(data.total_volume_cm3);
      document.getElementById("rec-weight").textContent = fmtNum(data.total_weight_kg);
      document.getElementById("rec-reason").textContent = data.reason;

      renderBoxList(data.boxes || []);
    }

    function renderBoxList(boxes) {
      const wrap = document.getElementById("other-boxes-wrap");
      const list = document.getElementById("box-list");
      if (!boxes.length) {
        wrap.classList.add("hidden");
        return;
      }
      wrap.classList.remove("hidden");
      list.innerHTML = "";
      boxes.forEach((b) => {
        const li = document.createElement("li");
        const fits = b.fits;
        li.className =
          "flex items-center justify-between rounded-lg p-2 text-sm " +
          (b.is_recommended
            ? "bg-indigo-50 border border-indigo-200"
            : fits
            ? "bg-slate-50"
            : "bg-slate-50 opacity-40");
        li.innerHTML = `
          <div>
            <span class="font-semibold">${b.name}</span>
            <span class="text-slate-400 text-xs"> · ${b.length_cm}×${b.width_cm}×${b.height_cm} cm</span>
          </div>
          <div class="flex items-center gap-2">
            <span>$${b.cost}</span>
            ${b.is_recommended ? '<span class="text-indigo-600 text-xs font-semibold">BEST</span>'
              : fits ? '<span class="text-green-600 text-xs">fits</span>'
              : '<span class="text-slate-400 text-xs">too small</span>'}
          </div>`;
        list.appendChild(li);
      });
    }

    function hideSuccess() {
      document.getElementById("order-success").classList.add("hidden");
    }

    document.getElementById("confirm-btn").addEventListener("click", async () => {
      const items = cartItemsPayload();
      if (items.length === 0) return;
      const btn = document.getElementById("confirm-btn");
      btn.disabled = true;
      btn.textContent = "Creating…";
      try {
        const res = await fetch(API.orders, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items }),
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById("order-ref").textContent = data.reference;
          document.getElementById("order-success").classList.remove("hidden");
        } else {
          alert("Could not create order: " + JSON.stringify(data));
        }
      } catch (err) {
        alert("Network error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Confirm Order";
      }
    });

    loadProducts();
  </script>
</body>
</html>
